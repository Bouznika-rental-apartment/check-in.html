<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-In · Costa Apartment · Bouznika</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@200;300;400;500&family=Tajawal:wght@200;300;400;500&family=Readex+Pro:wght@200;300;400;500&family=Raleway:ital,wght@0,200;0,300;0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#EFE3CA;
  --bg2:#E6D5B3;
  --surface:#F7F1E6;
  --ink:#1E1508;
  --ink2:#3A2D1C;
  --ink3:#5A4A34;
  --accent:#6B4F2A;
  --accent-light:#8C6A3C;
  --line:rgba(107,79,42,0.18);
  --line2:rgba(107,79,42,0.35);
  --line3:rgba(107,79,42,0.6);
  --ff-display:'Raleway',system-ui,sans-serif;
  --ff-body:'Raleway',system-ui,sans-serif;
  --ff-ar:'Readex Pro',system-ui,sans-serif;
  --red:#9B2B1E;
  --red-bg:rgba(155,43,30,0.08);
  --green:#2E6B3E;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--ff-body);
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  font-weight:400;
  line-height:1.6;
  font-size:17px;
  overflow-x:hidden;
}
body.ar{font-family:var(--ff-ar);direction:rtl}
body.ar .hero-eyebrow::before{display:none}
body.ar .hero-desc{border-left:none;border-right:2px solid var(--line3);padding-left:0;padding-right:22px}
body.ar .scroll-cta{flex-direction:row-reverse}
body.ar .btn-row{flex-direction:row-reverse}
body.ar .field label::after{display:none}
body.ar,
body.ar .step-tab,
body.ar .panel-title,
body.ar .panel-title em,
body.ar .panel-sub,
body.ar .hero-eyebrow,
body.ar .hero-h1,
body.ar .hero-h1 span,
body.ar .hero-desc,
body.ar .scroll-cta,
body.ar .step-num,
body.ar .field label,
body.ar input,
body.ar textarea,
body.ar .field-hint,
body.ar .err-msg,
body.ar .terms-box,
body.ar .terms-box h4,
body.ar .check-text,
body.ar .btn-next,
body.ar .btn-prev,
body.ar .btn-submit,
body.ar .success-title,
body.ar .success-title em,
body.ar .success-msg,
body.ar .nav-tag,
body.ar .ls-address,
body.ar .ls-divider,
body.ar .ls-native,
body.ar input[type=text],
body.ar input[type=tel],
body.ar input[type=date],
body.ar input[type=email],
body.ar textarea,
body.ar input::placeholder,
body.ar textarea::placeholder{
  font-family:var(--ff-ar) !important;
}
body.ar .footer{
  font-family:var(--ff-ar) !important;
  font-style:normal !important;
}
body.ar .field-hint{text-align:right}
body.ar .err-msg{text-align:right}

/* ── LANG SCREEN ── */
#langScreen{
  position:fixed;inset:0;background:var(--bg);z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;transition:opacity .5s,transform .5s;overflow:hidden;
}
#langScreen.out{opacity:0;transform:scale(1.04);pointer-events:none}
.ls-deco{position:absolute;border:1px solid var(--line);border-radius:50%;pointer-events:none}
.ls-deco1{width:500px;height:500px;top:-180px;right:-180px}
.ls-deco2{width:280px;height:280px;bottom:-100px;left:-80px}
.ls-deco3{width:160px;height:160px;bottom:60px;left:20px;border-color:var(--line2)}
.ls-logo-img{
  width:200px;height:auto;
  position:relative;z-index:1;
  margin-bottom:0;
}
.footer-logo-img{
  height:44px;width:auto;
  opacity:.9;
}
.ls-logo{
  font-family:var(--ff-display);font-style:italic;
  font-size:clamp(24px,4vw,34px);color:var(--accent);
  letter-spacing:0.04em;margin-bottom:6px;position:relative;z-index:1;
}
.ls-address{
  font-size:13px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:60px;position:relative;z-index:1;font-weight:400;
}
.ls-divider{
  display:flex;align-items:center;gap:16px;
  font-size:13px;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--ink2);margin-bottom:36px;position:relative;z-index:1;font-weight:400;
}
.ls-divider::before,.ls-divider::after{content:'';flex:1;max-width:56px;height:1px;background:var(--line2)}
.ls-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1}
.ls-card{
  width:160px;padding:32px 16px 28px;background:var(--surface);
  border:1px solid var(--line2);border-radius:8px;cursor:pointer;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  transition:border-color .2s,background .2s,transform .2s,box-shadow .2s;
}
.ls-card:hover{border-color:var(--accent);background:var(--bg);transform:translateY(-4px);box-shadow:0 8px 32px rgba(107,79,42,0.14)}
.ls-card:active{transform:translateY(-1px)}
.ls-flag{font-size:40px;line-height:1}
.ls-name{font-family:var(--ff-display);font-size:21px;font-weight:400;font-style:italic;color:var(--ink)}
.ls-native{font-size:13px;font-weight:400;color:var(--ink3)}

/* ── NOISE ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.5;
}

/* ── MAIN ── */
#mainContent{display:none}
#mainContent.show{display:block;animation:fadeIn .6s ease forwards}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── HERO ── */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;z-index:1}
.hero-bg{
  position:absolute;inset:0;z-index:0;
  background:radial-gradient(ellipse 60% 50% at 80% 20%,rgba(107,79,42,0.09) 0%,transparent 60%),
    radial-gradient(ellipse 40% 60% at 10% 80%,rgba(107,79,42,0.06) 0%,transparent 50%),var(--bg);
}
.hero-lines{position:absolute;inset:0;z-index:0;overflow:hidden}
.hero-lines::before{content:'';position:absolute;top:-20%;right:8%;width:1px;height:140%;background:linear-gradient(to bottom,transparent,var(--line) 30%,var(--line) 70%,transparent)}
.hero-lines::after{content:'';position:absolute;top:72px;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--line) 50%,transparent)}
.nav{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:32px 56px}
.nav-logo{display:flex;align-items:center}
.nav-logo-img{
  height:110px;
  width:auto;
  display:block;
}
.nav-tag{font-size:12px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink2);border:1px solid var(--line2);padding:7px 16px;border-radius:2px;cursor:pointer;transition:all .2s;user-select:none}
.nav-tag:hover{border-color:var(--accent);color:var(--accent)}
.hero-content{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;padding:60px 56px 80px;max-width:860px}
.hero-eyebrow{
  font-size:12px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--accent);margin-bottom:28px;display:flex;align-items:center;gap:16px;
}
.hero-eyebrow::before{content:'';display:block;width:32px;height:1px;background:var(--accent);opacity:.7}
.hero-h1{font-family:var(--ff-display);font-size:clamp(56px,8vw,96px);font-weight:400;line-height:.92;letter-spacing:-0.02em;margin-bottom:32px;color:var(--ink)}
.hero-h1 span{display:block;font-style:italic;color:var(--accent-light)}
.hero-desc{max-width:480px;font-size:16px;font-weight:400;color:var(--ink2);line-height:1.8;border-left:2px solid var(--line3);padding-left:22px}
.scroll-cta{margin-top:52px;display:flex;align-items:center;gap:14px;color:var(--ink2);font-size:13px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;font-weight:400}
.scroll-arrow{width:38px;height:38px;border:1px solid var(--line3);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:bob 2s ease-in-out infinite}
.scroll-arrow svg{stroke:var(--accent);fill:none;stroke-width:1.8;width:15px;height:15px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

/* ── FORM ── */
.form-section{position:relative;z-index:1;background:var(--surface);border-top:1px solid var(--line2)}
.form-inner{max-width:820px;margin:0 auto;padding:80px 56px 100px}
.steps-nav{display:flex;gap:0;margin-bottom:56px;border-bottom:1px solid var(--line2)}
.step-tab{
  flex:1;padding:16px 0 20px;font-size:12px;font-weight:400;
  letter-spacing:0.12em;text-transform:uppercase;color:var(--ink3);
  cursor:pointer;position:relative;text-align:center;transition:color .2s;border:none;background:none;font-family:inherit;
}
.step-tab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform .3s}
.step-tab.active{color:var(--accent);font-weight:500}
.step-tab.active::after{transform:scaleX(1)}
.step-tab.done{color:var(--ink2)}
.step-tab.done::after{transform:scaleX(1);background:var(--line3)}
.step-num{display:block;font-family:var(--ff-display);font-size:24px;font-weight:400;font-style:italic;color:inherit;margin-bottom:4px}
.step-panel{display:none}
.step-panel.active{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.panel-heading{margin-bottom:40px}
.panel-title{font-family:var(--ff-display);font-size:clamp(30px,4vw,44px);font-weight:400;line-height:1.1;color:var(--ink);margin-bottom:10px}
.panel-title em{font-style:italic;color:var(--accent-light)}
.panel-sub{font-size:15px;font-weight:400;color:var(--ink2);line-height:1.6}

/* ── FIELDS ── */
.row{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:28px}
.row.full{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:8px}
.field label{
  font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--ink2);display:flex;align-items:center;gap:8px;
}
.field label::after{content:'';flex:1;height:1px;background:var(--line2)}
input[type=text],input[type=tel],input[type=date],input[type=email],textarea{
  width:100%;background:transparent;border:none;border-bottom:2px solid var(--line3);
  color:var(--ink);font-family:inherit;font-size:17px;font-weight:400;
  padding:13px 0 11px;outline:none;transition:border-color .2s;
  border-radius:0;appearance:none;-webkit-appearance:none;color-scheme:light;
}
input::placeholder,textarea::placeholder{color:var(--ink3);opacity:.55;font-size:16px}
input:focus,textarea:focus{border-bottom-color:var(--accent)}
input.err,textarea.err{border-bottom-color:var(--red)!important}
textarea{resize:none;min-height:76px;line-height:1.6}
#plaque{font-family:'Courier New',monospace;font-size:22px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent)}

/* field hint + error */
.field-hint{font-size:13px;color:var(--ink3);margin-top:4px;font-weight:400}
.err-msg{font-size:13px;color:var(--red);margin-top:5px;font-weight:500;display:none}
.err-msg.show{display:block}

/* ── TERMS ── */
.terms-box{
  border:1px solid var(--line2);border-radius:6px;padding:28px;max-height:220px;
  overflow-y:auto;margin-bottom:24px;font-size:15px;font-weight:400;
  color:var(--ink2);line-height:1.8;background:var(--bg);
  scrollbar-width:thin;scrollbar-color:var(--line3) transparent;
}
.terms-box::-webkit-scrollbar{width:3px}
.terms-box::-webkit-scrollbar-thumb{background:var(--line3);border-radius:2px}
.terms-box h4{font-family:var(--ff-display);font-size:16px;font-weight:400;color:var(--accent);margin:16px 0 8px;font-style:italic}
.terms-box h4:first-child{margin-top:0}
.terms-box ul{padding-left:18px;margin-top:8px}
.terms-box li{margin-bottom:6px;color:var(--ink2)}
.terms-box hr{border:none;border-top:1px solid var(--line2);margin:16px 0}
.check-row{display:flex;align-items:flex-start;gap:16px;padding:20px 24px;border:1px solid var(--line2);border-radius:6px;cursor:pointer;transition:all .2s}
.check-row:hover{border-color:var(--line3)}
.check-row.checked{border-color:var(--accent);background:rgba(107,79,42,0.05)}
input[type=checkbox]{width:20px;height:20px;flex-shrink:0;margin-top:2px;accent-color:var(--accent);cursor:pointer}
.check-text{font-size:15px;font-weight:400;color:var(--ink2);line-height:1.6}
.check-text strong{color:var(--accent);font-weight:600}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:16px;margin-top:48px;align-items:center}
.btn-next,.btn-prev,.btn-submit{
  font-family:inherit;font-size:14px;font-weight:500;letter-spacing:0.12em;
  text-transform:uppercase;cursor:pointer;border:none;transition:all .2s;
  padding:17px 36px;border-radius:3px;
}
.btn-next,.btn-submit{background:var(--accent);color:#F7F1E6;flex:1}
.btn-next:hover,.btn-submit:hover{background:var(--ink)}
.btn-next:active,.btn-submit:active{transform:scale(0.98)}
.btn-prev{background:transparent;color:var(--ink2);border:1.5px solid var(--line3);padding:17px 24px}
.btn-prev:hover{color:var(--ink);border-color:var(--accent)}
.btn-submit{display:flex;align-items:center;justify-content:center;gap:10px}
.btn-submit svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-submit.loading{opacity:.6;pointer-events:none}

/* ── SUCCESS ── */
.success-panel{display:none;text-align:center;padding:80px 40px}
.success-panel.show{display:block;animation:fadeUp .5s ease}
.success-ring{width:84px;height:84px;border:1px solid rgba(46,107,62,0.4);border-radius:50%;margin:0 auto 28px;display:flex;align-items:center;justify-content:center}
.success-ring svg{width:32px;height:32px;stroke:var(--green);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.success-title{font-family:var(--ff-display);font-size:clamp(32px,5vw,52px);font-weight:400;line-height:1.1;margin-bottom:16px;color:var(--ink)}
.success-title em{font-style:italic;color:var(--accent-light)}
.success-msg{font-size:16px;font-weight:400;color:var(--ink2);max-width:420px;margin:0 auto;line-height:1.8}
.success-divider{width:40px;height:1px;background:var(--line3);margin:28px auto}

/* ── FOOTER ── */
.footer{position:relative;z-index:1;border-top:1px solid var(--line2);background:var(--bg2);padding:28px 56px;display:flex;align-items:center;justify-content:space-between;font-size:13px;letter-spacing:0.08em;color:var(--ink2);font-weight:400}


@media(max-width:600px){
  .nav{padding:20px 24px}
  .hero-content{padding:40px 24px 60px}
  .form-inner{padding:48px 24px 80px}
  .row{grid-template-columns:1fr}
  .footer{flex-direction:column;gap:10px;text-align:center;padding:24px}
  .steps-nav{overflow-x:auto}
  .hero-h1{font-size:clamp(44px,12vw,80px)}
  .ls-cards{gap:12px}
  .ls-card{width:130px;padding:24px 14px 20px}
}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── FILE UPLOAD ── */
.upload-area{
  border:2px dashed var(--line3);
  border-radius:8px;
  padding:24px 20px;
  text-align:center;
  cursor:pointer;
  transition:all .2s;
  background:var(--bg);
  position:relative;
}
.upload-area:hover{border-color:var(--accent);background:var(--bg2)}
.upload-area.has-file{border-style:solid;border-color:var(--accent);background:rgba(107,79,42,0.06)}
.upload-area input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
  border:none;padding:0;font-size:0;
}
.upload-icon{font-size:28px;margin-bottom:8px}
.upload-label{font-size:14px;font-weight:500;color:var(--ink2);display:block;margin-bottom:4px}
.upload-hint{font-size:12px;color:var(--ink3)}
.upload-preview{
  display:none;align-items:center;gap:12px;
  background:var(--surface);border-radius:6px;
  padding:10px 14px;margin-top:10px;
}
.upload-preview.show{display:flex}
.upload-preview img{width:48px;height:48px;object-fit:cover;border-radius:4px;border:1px solid var(--line2)}
.upload-preview-name{font-size:13px;color:var(--ink2);flex:1;text-align:left;word-break:break-all}
.upload-remove{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:18px;padding:0 4px;line-height:1}
.upload-remove:hover{color:var(--red)}
.upload-progress{height:3px;background:var(--line2);border-radius:2px;margin-top:8px;overflow:hidden;display:none}
.upload-progress.show{display:block}
.upload-progress-bar{height:100%;background:var(--accent);width:0%;transition:width .3s;border-radius:2px}
body.ar .upload-preview-name{text-align:right}

</style>
</head>
<body>

<!-- ════ LANGUAGE SCREEN ════ -->
<div id="langScreen">
  <div class="ls-deco ls-deco1"></div>

let lang='fr',current=0;

/* ── VALIDATION RULES ── */
function validate(id){
  const t=T[lang];
  const el=document.getElementById(id);
  const v=el.value.trim();
  const errEl=document.getElementById('e-'+id);
  let msg='';

  if(id==='nom'){
    if(!v||v.length<2) msg=t.enom;
    else if(!/^[\p{L}\s\-'\.]+$/u.test(v)) msg=t.enom;
  }
  else if(id==='cin'){
    if(!v||v.length<5) msg=t.ecinShort;
    else if(!/^[A-Z0-9]{5,20}$/i.test(v.replace(/[\s\-]/g,''))) msg=t.ecinInvalid;
  }
  else if(id==='dob'){
    if(!v){msg=t.edob;}
    else{
      const d=new Date(v);
      const now=new Date();
      const age=(now-d)/(365.25*24*3600*1000);
      if(isNaN(age)||age<0) msg=t.edob;
      else if(age<18) msg=t.edob18;
      else if(age>110) msg=t.edob;
    }
  }
  else if(id==='adresse'){
    if(!v||v.length<5) msg=t.eadresse;
  }
  else if(id==='tel'){
    const cleaned=v.replace(/[\s\-\(\)\.]/g,'');
    if(!v) msg=t.etel;
    else if(!/^\+?[0-9]{8,15}$/.test(cleaned)) msg=t.etel;
  }
  else if(id==='email'){
    if(!v||!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v)) msg=t.eemail;
  }
  else if(id==='plaque'){
    const cleaned=v.replace(/[\s\-·]/g,'').toUpperCase();
    if(!v) msg=t.eplaque;
    else if(!/^[0-9]{3,6}[A-Z]{1,2}[0-9]{1,2}$/.test(cleaned)&&!/^[A-Z0-9]{4,12}$/.test(cleaned)) msg=t.eplaque;
  }
  else if(id==='cin-recto'){
    const input=document.getElementById('cin-recto');
    if(!input||!input.files||!input.files[0]) msg=t.ecinPhoto;
  }

  if(errEl){
    errEl.textContent=msg;
    errEl.classList.toggle('show',!!msg);
  }
  el.classList.toggle('err',!!msg);
  return !msg;
}

const fieldMap={0:['nom','cin','dob','adresse'],1:['tel','email'],2:['plaque'],3:[]};

function goTo(n){
  const required=fieldMap[current];
  let ok=true;
  required.forEach(id=>{if(!validate(id))ok=false});
  if(!ok)return;

  const panels=document.querySelectorAll('.step-panel');
  const tabs=document.querySelectorAll('.step-tab');
  panels[current].classList.remove('active');
  tabs[current].classList.remove('active');
  tabs[current].classList.add('done');
  current=n;
  panels[current].classList.add('active');
  tabs[current].classList.remove('done');
  tabs[current].classList.add('active');
  document.querySelector('.form-section').scrollIntoView({behavior:'smooth',block:'start'});
}

/* validate on blur */
['nom','cin','dob','adresse','tel','email','plaque'].forEach(id=>{
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('blur',()=>validate(id));
  el.addEventListener('input',()=>{
    if(el.classList.contains('err')) validate(id);
    if(id==='plaque') el.value=el.value.toUpperCase();
  });
});

const CLOUDINARY_CLOUD  = 'di3ylyaic';
const CLOUDINARY_PRESET = 'costa_checkin';
const uploadedUrls = { recto: '', verso: '' };

/* ── FILE UPLOAD HELPERS ── */
function handleFileSelect(input, id) {
  const file = input.files[0];
  if (!file) return;

  const area     = document.getElementById('ua-' + id);
  const preview  = document.getElementById('up-' + id);
  const previewImg = document.getElementById('uimg-' + id);
  const previewName = document.getElementById('uname-' + id);

  area.classList.add('has-file');
  previewName.textContent = file.name;

  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = e => { previewImg.src = e.target.result; previewImg.style.display = 'block'; };
    reader.readAsDataURL(file);
  } else {
    previewImg.style.display = 'none';
  }
  preview.classList.add('show');

  const errEl = document.getElementById('e-' + id);
  if (errEl) { errEl.textContent = ''; errEl.classList.remove('show'); }
}

function removeFile(id) {
  document.getElementById(id).value = '';
  document.getElementById('ua-' + id).classList.remove('has-file');
  document.getElementById('up-' + id).classList.remove('show');
  document.getElementById('uimg-' + id).src = '';
  const key = id === 'cin-recto' ? 'recto' : 'verso';
  uploadedUrls[key] = '';
}

async function uploadToCloudinary(inputId) {
  const input = document.getElementById(inputId);
  if (!input.files[0]) return '';

  const key      = inputId === 'cin-recto' ? 'recto' : 'verso';
  const progWrap = document.getElementById('uprog-' + inputId);
  const progBar  = document.getElementById('ubar-'  + inputId);
  progWrap.classList.add('show');
  progBar.style.width = '20%';

  const formData = new FormData();
  formData.append('file',          input.files[0]);
  formData.append('upload_preset', CLOUDINARY_PRESET);
  formData.append('folder',        'costa-checkin');

  try {
    progBar.style.width = '50%';
    const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/auto/upload`, {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    progBar.style.width = '100%';
    setTimeout(() => progWrap.classList.remove('show'), 800);
    uploadedUrls[key] = data.secure_url || '';
    return data.secure_url || '';
  } catch(err) {
    progWrap.classList.remove('show');
    console.warn('Cloudinary upload error:', err);
    return '';
  }
}
